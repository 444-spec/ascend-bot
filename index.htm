<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta apple-mobile-web-app-title" content="Ascend"/>
<meta name="theme-color" content="#0d0f0e"/>
<title>Ascend Brand Architects</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0d0f0e;
    --surface: #111512;
    --surface2: #181c19;
    --border: #252d26;
    --green: #4a7c5f;
    --green-bright: #6aab82;
    --green-dim: #2e4f3a;
    --text: #e6ede8;
    --text-muted: #6e7d71;
    --text-dim: #3a4a3d;
    --user-bubble: #141c16;
    --bot-bubble: #0f1410;
    --accent: #6aab82;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html { height: 100%; height: -webkit-fill-available; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    font-weight: 300;
    height: 100vh;
    height: -webkit-fill-available;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: fixed;
    width: 100%;
  }

  /* Header */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 18px 28px;
    padding-top: calc(18px + env(safe-area-inset-top));
    display: flex;
    align-items: center;
    gap: 14px;
    flex-shrink: 0;
  }

  .logo-mark {
    width: 38px;
    height: 38px;
    border: 1.5px solid var(--green);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Cormorant Garamond', serif;
    color: var(--green-bright);
    font-size: 18px;
    font-weight: 700;
    flex-shrink: 0;
    letter-spacing: -1px;
  }

  .header-text h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: 0.5px;
  }

  .header-text p {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-top: 1px;
    font-family: 'Outfit', sans-serif;
  }

  .status-dot {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 12px;
    color: var(--text-muted);
  }

  .status-dot span {
    width: 7px;
    height: 7px;
    background: #4caf85;
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* Chat Area */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 28px 20px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .chat-area::-webkit-scrollbar { width: 4px; }
  .chat-area::-webkit-scrollbar-track { background: transparent; }
  .chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .message-row {
    display: flex;
    gap: 12px;
    animation: fadeSlide 0.35s ease;
    max-width: 760px;
    margin: 0 auto;
    width: 100%;
  }

  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .message-row.user { flex-direction: row-reverse; }

  .avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 500;
    margin-top: 2px;
  }

  .avatar.bot {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--green-bright);
    font-family: 'Cormorant Garamond', serif;
  }

  .avatar.user {
    background: var(--user-bubble);
    border: 1px solid var(--border);
    color: var(--text-muted);
  }

  .bubble {
    max-width: 78%;
    padding: 14px 18px;
    border-radius: 16px;
    font-size: 14.5px;
    line-height: 1.7;
    font-weight: 300;
    font-family: 'Outfit', sans-serif;
  }

  .bubble.bot {
    background: var(--bot-bubble);
    border: 1px solid var(--border);
    border-top-left-radius: 4px;
    color: var(--text);
  }

  .bubble.user {
    background: var(--user-bubble);
    border: 1px solid #1e2820;
    border-top-right-radius: 4px;
    color: var(--text);
    text-align: right;
  }

  .bubble strong {
    color: var(--green-bright);
    font-weight: 500;
  }

  .bubble ul {
    padding-left: 18px;
    margin-top: 6px;
  }

  .bubble li {
    margin-bottom: 4px;
  }

  /* Typing indicator */
  .typing-indicator {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 14px 18px;
    background: var(--bot-bubble);
    border: 1px solid var(--border);
    border-radius: 16px;
    border-top-left-radius: 4px;
    width: fit-content;
  }

  .typing-indicator span {
    width: 6px;
    height: 6px;
    background: var(--text-dim);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }

  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }

  /* Input */
  .input-area {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 12px 16px;
    padding-bottom: calc(12px + env(safe-area-inset-bottom));
    flex-shrink: 0;
  }

  .input-wrap {
    max-width: 760px;
    margin: 0 auto;
    display: flex;
    gap: 10px;
    align-items: flex-end;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 10px 12px;
    transition: border-color 0.2s;
  }

  .input-wrap:focus-within {
    border-color: var(--green-dim);
  }

  textarea {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    font-size: 16px;
    font-weight: 300;
    resize: none;
    max-height: 120px;
    line-height: 1.6;
  }

  textarea::placeholder { color: var(--text-dim); }

  .send-btn {
    width: 42px;
    height: 42px;
    min-width: 42px;
    background: var(--green);
    border: none;
    border-radius: 9px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.2s, transform 0.1s;
    touch-action: manipulation;
  }

  .send-btn:hover { background: var(--green-bright); }
  .send-btn:active { transform: scale(0.94); }
  .send-btn:disabled { background: var(--text-dim); cursor: not-allowed; }

  .send-btn svg { width: 16px; height: 16px; fill: #0d0f0e; }

  /* Suggestions */
  .suggestions {
    max-width: 760px;
    margin: 0 auto 10px;
    display: flex;
    flex-wrap: nowrap;
    gap: 8px;
    overflow-x: auto;
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
    padding-bottom: 2px;
  }

  .suggestions::-webkit-scrollbar { display: none; }

  .chip {
    padding: 9px 16px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    font-size: 13px;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Outfit', sans-serif;
    white-space: nowrap;
    flex-shrink: 0;
    touch-action: manipulation;
  }

  .chip:active {
    border-color: var(--green-dim);
    color: var(--green-bright);
  }

  .divider {
    text-align: center;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 6px 0 0;
  }

  /* Mobile-specific */
  @media (max-width: 600px) {
    .header { padding: 14px 16px; padding-top: calc(14px + env(safe-area-inset-top)); }
    .header-text h1 { font-size: 15px; }
    .chat-area { padding: 16px 12px; gap: 14px; }
    .bubble { font-size: 14px; padding: 12px 14px; max-width: 88%; }
    .avatar { width: 28px; height: 28px; font-size: 11px; }
    .message-row { gap: 8px; }
    .input-area { padding: 10px 12px; padding-bottom: calc(10px + env(safe-area-inset-bottom)); }
    .divider { display: none; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo-mark">Ab</div>
  <div class="header-text">
    <h1>Ascend Brand Architects</h1>
    <p>Client &amp; Onboarding</p>
  </div>
  <div class="status-dot"><span></span> Online</div>
</div>

<div class="chat-area" id="chatArea"></div>

<div class="input-area">
  <div class="suggestions" id="suggestions">
    <div class="chip" onclick="useChip(this)">What does Ascend do?</div>
    <div class="chip" onclick="useChip(this)">How do we get started?</div>
    <div class="chip" onclick="useChip(this)">What are your rates?</div>
    <div class="chip" onclick="useChip(this)">Tell me about brand strategy</div>
    <div class="chip" onclick="useChip(this)">Book a Discovery Call</div>
  </div>
  <div class="input-wrap">
    <textarea id="msgInput" rows="1" placeholder="Type your message…" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>
  <div class="divider">Ascend Brand Architects · Powered by Claude</div>
</div>

<script>
const SYSTEM_PROMPT = `You are the official client assistant for Ascend Brand Architects — a premier branding and brand strategy agency. Your role is to assist prospective and new clients with sales inquiries and onboarding in a manner that reflects Ascend's elevated, strategic positioning.

About Ascend Brand Architects:
Ascend Brand Architects is a specialist branding agency dedicated to building bold, enduring brand identities for businesses that are ready to rise above the noise. We combine strategic thinking with meticulous creative craft to architect brands that command attention, inspire loyalty, and drive business growth.

Your primary goals:
1. Understand the client's brand vision and business goals through thoughtful questions
2. Present Ascend's services with confidence and authority
3. Guide qualified prospects through Ascend's onboarding process
4. Reflect Ascend's brand voice: strategic, confident, refined — never generic or rushed

Ascend's Core Services:
- Brand Strategy & Positioning (brand purpose, values, audience mapping, competitive differentiation)
- Brand Identity Design (logo systems, visual identity, colour & typography, brand guidelines)
- Brand Naming & Messaging (naming, taglines, tone of voice, copywriting frameworks)
- Brand Experience Design (branded touchpoints, packaging, environmental, digital)
- Brand Audit & Refresh (evaluating and evolving existing brands for growth)

Onboarding Process at Ascend:
1. Discovery Conversation — A complimentary 30-minute consultation to understand your brand goals
2. Brand Brief — We send you a tailored brief questionnaire to go deeper before the proposal
3. Strategic Proposal — A scoped proposal with investment range, delivered within 3–5 business days
4. Agreement & Retainer — Contract confirmation and 50% commencement deposit
5. Brand Sprint Kickoff — A focused session to align on strategy, direction, and timelines
6. Delivery & Brand Handover — Milestone reviews, final delivery, and a full brand handover session

Investment Ranges (always recommend a Discovery Conversation for precise quotes):
- Brand Strategy: $2,000 – $6,000
- Brand Identity: $3,500 – $12,000
- Full Brand Build (Strategy + Identity): $6,000 – $20,000
- Brand Naming & Messaging: $1,500 – $5,000
- Brand Audit & Refresh: $2,500 – $8,000

Key principles when speaking:
- Use language like "brand architecture", "brand equity", "strategic positioning", "brand clarity"
- Speak as a trusted advisor, not a salesperson
- Always encourage booking a Discovery Conversation as the ideal first step
- If asked something outside scope, politely redirect to email: hello@ascendbrandarchitects.com

Do not use casual language. Every response should feel considered, intelligent, and worthy of the Ascend brand.`;

const chatArea = document.getElementById('chatArea');
const msgInput = document.getElementById('msgInput');
const sendBtn = document.getElementById('sendBtn');
let conversationHistory = [];
let isTyping = false;

function addMessage(role, content) {
  const row = document.createElement('div');
  row.className = `message-row ${role}`;

  const avatar = document.createElement('div');
  avatar.className = `avatar ${role}`;
  avatar.textContent = role === 'bot' ? 'Ab' : 'You';

  const bubble = document.createElement('div');
  bubble.className = `bubble ${role}`;
  bubble.innerHTML = formatText(content);

  row.appendChild(avatar);
  row.appendChild(bubble);
  chatArea.appendChild(row);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function formatText(text) {
  return text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/^- (.+)/gm, '<li>$1</li>')
    .replace(/((<li>.*<\/li>\s*)+)/g, '<ul>$1</ul>')
    .replace(/\n/g, '<br>');
}

function showTyping() {
  const row = document.createElement('div');
  row.className = 'message-row bot';
  row.id = 'typingRow';

  const avatar = document.createElement('div');
  avatar.className = 'avatar bot';
  avatar.textContent = 'Ab';

  const indicator = document.createElement('div');
  indicator.className = 'typing-indicator';
  indicator.innerHTML = '<span></span><span></span><span></span>';

  row.appendChild(avatar);
  row.appendChild(indicator);
  chatArea.appendChild(row);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typingRow');
  if (el) el.remove();
}

async function sendMessage(text) {
  const content = (text || msgInput.value).trim();
  if (!content || isTyping) return;

  document.getElementById('suggestions').style.display = 'none';

  addMessage('user', content);
  msgInput.value = '';
  autoResize(msgInput);
  isTyping = true;
  sendBtn.disabled = true;

  conversationHistory.push({ role: 'user', content });

  showTyping();

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: conversationHistory
      })
    });

    const data = await response.json();
    removeTyping();

    const reply = data.content?.[0]?.text || 'I apologise — something went wrong. Please try again.';
    conversationHistory.push({ role: 'assistant', content: reply });
    addMessage('bot', reply);

  } catch (err) {
    removeTyping();
    addMessage('bot', 'I apologise — I was unable to process your request. Please refresh and try again.');
  }

  isTyping = false;
  sendBtn.disabled = false;
}

function useChip(el) {
  sendMessage(el.textContent);
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

// Mobile keyboard: resize chat area when keyboard opens/closes
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', () => {
    document.body.style.height = window.visualViewport.height + 'px';
    chatArea.scrollTop = chatArea.scrollHeight;
  });
}

// Greeting
window.addEventListener('load', () => {
  setTimeout(() => {
    const greeting = `Welcome to **Ascend Brand Architects**.

I'm here to assist you with any questions about our services and to guide you through our process should you be ready to take your brand to the next level.

**How may I assist you today?**

You might like to explore:
- **Our services** — brand strategy, identity, naming & messaging
- **Investment** — ranges for each service area
- **Our process** — how we architect brands from discovery to delivery
- **Getting started** — booking your complimentary Discovery Conversation`;
    addMessage('bot', greeting);
    conversationHistory.push({ role: 'assistant', content: greeting });
  }, 400);
});
</script>
</body>
</html>
